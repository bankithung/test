<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fluid — real-time Navier–Stokes</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
  }
  #canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    cursor: crosshair;
    touch-action: none;
  }
  .ui {
    position: fixed;
    z-index: 2;
    transition: opacity 0.8s ease;
  }
  body.idle .ui { opacity: 0; }
  body.idle #canvas { cursor: none; }
  #title {
    bottom: 18px;
    left: 20px;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.55);
    pointer-events: none;
  }
  #hint {
    bottom: 36px;
    left: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    pointer-events: none;
  }
  #stats {
    bottom: 18px;
    right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    text-align: right;
    pointer-events: none;
  }
  #controls {
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
  }
  #controls button {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.85);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: inherit;
    letter-spacing: 0.06em;
    cursor: pointer;
  }
  #controls button:hover {
    background: rgba(255,255,255,0.16);
  }
  #controls button:active {
    transform: scale(0.97);
  }
  #fallback {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    padding: 24px;
    text-align: center;
    z-index: 3;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="title" class="ui">navier–stokes · real-time gpu solver</div>
<div id="hint" class="ui">drag to stir · click to splash · [f] fullscreen · [b] burst · [c] calm</div>
<div id="stats" class="ui"></div>
<div id="controls" class="ui">
  <button id="btn-burst" type="button">Burst</button>
  <button id="btn-calm" type="button">Calm</button>
  <button id="btn-fs" type="button">Fullscreen</button>
</div>
<div id="fallback"></div>
<script>
(function () {
'use strict';
var canvas = document.getElementById('canvas');
var statsEl = document.getElementById('stats');
var fallbackEl = document.getElementById('fallback');

function fail(msg) {
  fallbackEl.style.display = 'flex';
  fallbackEl.textContent = msg;
}

function resizeCanvas() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
  var h = Math.max(1, Math.floor(canvas.clientHeight * dpr));
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    return true;
  }
  return false;
}
resizeCanvas();

var params = { alpha: false, depth: false, stencil: false, antialias: false, preserveDrawingBuffer: false };
var gl = canvas.getContext('webgl2', params);
var isWebGL2 = !!gl;
if (!isWebGL2) gl = canvas.getContext('webgl', params) || canvas.getContext('experimental-webgl', params);
if (!gl) { fail('WebGL is not available in this browser, so the fluid cannot run here.'); return; }

var halfFloatTexType, supportLinearFiltering;
if (isWebGL2) {
  gl.getExtension('EXT_color_buffer_float');
  halfFloatTexType = gl.HALF_FLOAT;
  supportLinearFiltering = true;
} else {
  var hf = gl.getExtension('OES_texture_half_float');
  supportLinearFiltering = !!gl.getExtension('OES_texture_half_float_linear');
  halfFloatTexType = hf ? hf.HALF_FLOAT_OES : null;
}
if (!halfFloatTexType) { fail('This browser lacks floating-point texture support, which the solver needs.'); return; }

try {

function supportRenderTextureFormat(internalFormat, format, type) {
  var texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, 4, 4, 0, format, type, null);
  var fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  var ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.deleteFramebuffer(fbo);
  gl.deleteTexture(texture);
  return ok;
}

function getSupportedFormat(internalFormat, format, type) {
  if (supportRenderTextureFormat(internalFormat, format, type)) return { internalFormat: internalFormat, format: format };
  if (isWebGL2) {
    if (internalFormat === gl.R16F) return getSupportedFormat(gl.RG16F, gl.RG, type);
    if (internalFormat === gl.RG16F) return getSupportedFormat(gl.RGBA16F, gl.RGBA, type);
  }
  return null;
}

var formatRGBA, formatRG, formatR;
if (isWebGL2) {
  formatRGBA = getSupportedFormat(gl.RGBA16F, gl.RGBA, halfFloatTexType);
  formatRG = getSupportedFormat(gl.RG16F, gl.RG, halfFloatTexType);
  formatR = getSupportedFormat(gl.R16F, gl.RED, halfFloatTexType);
} else {
  formatRGBA = supportRenderTextureFormat(gl.RGBA, gl.RGBA, halfFloatTexType) ? { internalFormat: gl.RGBA, format: gl.RGBA } : null;
  formatRG = formatRGBA;
  formatR = formatRGBA;
}
if (!formatRGBA || !formatRG || !formatR) { fail('This GPU cannot render to floating-point textures, which the solver needs.'); return; }

var big = Math.min(window.screen.width, window.screen.height) >= 700 || window.innerWidth >= 1024;
var small = window.innerWidth < 600;
var config = {
  SIM_RESOLUTION: small ? 112 : (big ? 160 : 144),
  DYE_RESOLUTION: small ? 512 : (big ? 1024 : 768),
  DENSITY_DISSIPATION: 0.9,
  VELOCITY_DISSIPATION: 0.22,
  PRESSURE: 0.8,
  PRESSURE_ITERATIONS: small ? 16 : 20,
  CURL: 32,
  SPLAT_RADIUS: 0.24,
  SPLAT_FORCE: 6200
};

var baseVertexSrc = 'precision highp float;attribute vec2 aPosition;varying vec2 vUv;varying vec2 vL;varying vec2 vR;varying vec2 vT;varying vec2 vB;uniform vec2 texelSize;void main(){vUv=aPosition*0.5+0.5;vL=vUv-vec2(texelSize.x,0.0);vR=vUv+vec2(texelSize.x,0.0);vT=vUv+vec2(0.0,texelSize.y);vB=vUv-vec2(0.0,texelSize.y);gl_Position=vec4(aPosition,0.0,1.0);}';
var clearSrc = 'precision mediump float;precision mediump sampler2D;varying highp vec2 vUv;uniform sampler2D uTexture;uniform float value;void main(){gl_FragColor=value*texture2D(uTexture,vUv);}';
var splatSrc = 'precision highp float;precision highp sampler2D;varying vec2 vUv;uniform sampler2D uTarget;uniform float aspectRatio;uniform vec3 color;uniform vec2 point;uniform float radius;void main(){vec2 p=vUv-point.xy;p.x*=aspectRatio;vec3 splat=exp(-dot(p,p)/radius)*color;vec3 base=texture2D(uTarget,vUv).xyz;gl_FragColor=vec4(base+splat,1.0);}';
var advectionSrc = 'precision highp float;precision highp sampler2D;varying vec2 vUv;uniform sampler2D uVelocity;uniform sampler2D uSource;uniform vec2 texelSize;uniform vec2 dyeTexelSize;uniform float dt;uniform float dissipation;vec4 bilerp(sampler2D sam,vec2 uv,vec2 tsize){vec2 st=uv/tsize-0.5;vec2 iuv=floor(st);vec2 fuv=fract(st);vec4 a=texture2D(sam,(iuv+vec2(0.5,0.5))*tsize);vec4 b=texture2D(sam,(iuv+vec2(1.5,0.5))*tsize);vec4 c=texture2D(sam,(iuv+vec2(0.5,1.5))*tsize);vec4 d=texture2D(sam,(iuv+vec2(1.5,1.5))*tsize);return mix(mix(a,b,fuv.x),mix(c,d,fuv.x),fuv.y);}void main(){\n#ifdef MANUAL_FILTERING\nvec2 coord=vUv-dt*bilerp(uVelocity,vUv,texelSize).xy*texelSize;vec4 result=bilerp(uSource,coord,dyeTexelSize);\n#else\nvec2 coord=vUv-dt*texture2D(uVelocity,vUv).xy*texelSize;vec4 result=texture2D(uSource,coord);\n#endif\nfloat decay=1.0+dissipation*dt;gl_FragColor=result/decay;}';
var divergenceSrc = 'precision mediump float;precision mediump sampler2D;varying highp vec2 vUv;varying highp vec2 vL;varying highp vec2 vR;varying highp vec2 vT;varying highp vec2 vB;uniform sampler2D uVelocity;void main(){float L=texture2D(uVelocity,vL).x;float R=texture2D(uVelocity,vR).x;float T=texture2D(uVelocity,vT).y;float B=texture2D(uVelocity,vB).y;vec2 C=texture2D(uVelocity,vUv).xy;if(vL.x<0.0){L=-C.x;}if(vR.x>1.0){R=-C.x;}if(vT.y>1.0){T=-C.y;}if(vB.y<0.0){B=-C.y;}float div=0.5*(R-L+T-B);gl_FragColor=vec4(div,0.0,0.0,1.0);}';
var curlSrc = 'precision mediump float;precision mediump sampler2D;varying highp vec2 vUv;varying highp vec2 vL;varying highp vec2 vR;varying highp vec2 vT;varying highp vec2 vB;uniform sampler2D uVelocity;void main(){float L=texture2D(uVelocity,vL).y;float R=texture2D(uVelocity,vR).y;float T=texture2D(uVelocity,vT).x;float B=texture2D(uVelocity,vB).x;float vorticity=R-L-T+B;gl_FragColor=vec4(0.5*vorticity,0.0,0.0,1.0);}';
var vorticitySrc = 'precision highp float;precision highp sampler2D;varying vec2 vUv;varying vec2 vL;varying vec2 vR;varying vec2 vT;varying vec2 vB;uniform sampler2D uVelocity;uniform sampler2D uCurl;uniform float curl;uniform float dt;void main(){float L=texture2D(uCurl,vL).x;float R=texture2D(uCurl,vR).x;float T=texture2D(uCurl,vT).x;float B=texture2D(uCurl,vB).x;float C=texture2D(uCurl,vUv).x;vec2 force=0.5*vec2(abs(T)-abs(B),abs(R)-abs(L));force/=length(force)+0.0001;force*=curl*C;force.y*=-1.0;vec2 velocity=texture2D(uVelocity,vUv).xy;velocity+=force*dt;velocity=min(max(velocity,-1000.0),1000.0);gl_FragColor=vec4(velocity,0.0,1.0);}';
var pressureSrc = 'precision mediump float;precision mediump sampler2D;varying highp vec2 vUv;varying highp vec2 vL;varying highp vec2 vR;varying highp vec2 vT;varying highp vec2 vB;uniform sampler2D uPressure;uniform sampler2D uDivergence;void main(){float L=texture2D(uPressure,vL).x;float R=texture2D(uPressure,vR).x;float T=texture2D(uPressure,vT).x;float B=texture2D(uPressure,vB).x;float divergence=texture2D(uDivergence,vUv).x;float pressure=(L+R+B+T-divergence)*0.25;gl_FragColor=vec4(pressure,0.0,0.0,1.0);}';
var gradientSrc = 'precision mediump float;precision mediump sampler2D;varying highp vec2 vUv;varying highp vec2 vL;varying highp vec2 vR;varying highp vec2 vT;varying highp vec2 vB;uniform sampler2D uPressure;uniform sampler2D uVelocity;void main(){float L=texture2D(uPressure,vL).x;float R=texture2D(uPressure,vR).x;float T=texture2D(uPressure,vT).x;float B=texture2D(uPressure,vB).x;vec2 velocity=texture2D(uVelocity,vUv).xy;velocity.xy-=vec2(R-L,T-B);gl_FragColor=vec4(velocity,0.0,1.0);}';
var displaySrc = 'precision highp float;precision highp sampler2D;varying vec2 vUv;varying vec2 vL;varying vec2 vR;varying vec2 vT;varying vec2 vB;uniform sampler2D uTexture;uniform vec2 texelSize;void main(){vec3 c=texture2D(uTexture,vUv).rgb;vec3 lc=texture2D(uTexture,vL).rgb;vec3 rc=texture2D(uTexture,vR).rgb;vec3 tc=texture2D(uTexture,vT).rgb;vec3 bc=texture2D(uTexture,vB).rgb;float dx=length(rc)-length(lc);float dy=length(tc)-length(bc);vec3 n=normalize(vec3(dx,dy,length(texelSize)));vec3 l=vec3(0.0,0.0,1.0);float diffuse=clamp(dot(n,l)+0.7,0.7,1.0);c*=diffuse;gl_FragColor=vec4(c,1.0);}';

function compileShader(type, source, keywords) {
  if (keywords && keywords.length) source = keywords.map(function (k) { return '#define ' + k + '\n'; }).join('') + source;
  var shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(shader));
  return shader;
}

function createProgram(vs, fsSrc, keywords) {
  var fs = compileShader(gl.FRAGMENT_SHADER, fsSrc, keywords);
  var program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.bindAttribLocation(program, 0, 'aPosition');
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(program));
  var uniforms = {};
  var n = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
  for (var i = 0; i < n; i++) {
    var name = gl.getActiveUniform(program, i).name;
    uniforms[name] = gl.getUniformLocation(program, name);
  }
  return { program: program, uniforms: uniforms, bind: function () { gl.useProgram(program); } };
}

var baseVS = compileShader(gl.VERTEX_SHADER, baseVertexSrc);
var clearProgram = createProgram(baseVS, clearSrc);
var splatProgram = createProgram(baseVS, splatSrc);
var advectionProgram = createProgram(baseVS, advectionSrc, supportLinearFiltering ? null : ['MANUAL_FILTERING']);
var divergenceProgram = createProgram(baseVS, divergenceSrc);
var curlProgram = createProgram(baseVS, curlSrc);
var vorticityProgram = createProgram(baseVS, vorticitySrc);
var pressureProgram = createProgram(baseVS, pressureSrc);
var gradientProgram = createProgram(baseVS, gradientSrc);
var displayProgram = createProgram(baseVS, displaySrc);

var blit = (function () {
  var buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, -1, 1, 1, 1, 1, -1]), gl.STATIC_DRAW);
  var elem = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, elem);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0, 1, 2, 0, 2, 3]), gl.STATIC_DRAW);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(0);
  return function (target) {
    if (target == null) {
      gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    } else {
      gl.viewport(0, 0, target.width, target.height);
      gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
    }
    gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
  };
})();

function createFBO(w, h, internalFormat, format, type, param) {
  gl.activeTexture(gl.TEXTURE0);
  var texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, param);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, param);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, w, h, 0, format, type, null);
  var fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  gl.viewport(0, 0, w, h);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  return {
    texture: texture, fbo: fbo, width: w, height: h,
    texelSizeX: 1 / w, texelSizeY: 1 / h,
    attach: function (id) {
      gl.activeTexture(gl.TEXTURE0 + id);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      return id;
    }
  };
}

function createDoubleFBO(w, h, internalFormat, format, type, param) {
  var fbo1 = createFBO(w, h, internalFormat, format, type, param);
  var fbo2 = createFBO(w, h, internalFormat, format, type, param);
  return {
    width: w, height: h, texelSizeX: 1 / w, texelSizeY: 1 / h,
    get read() { return fbo1; },
    get write() { return fbo2; },
    swap: function () { var t = fbo1; fbo1 = fbo2; fbo2 = t; }
  };
}

function getResolution(resolution) {
  var aspect = gl.drawingBufferWidth / gl.drawingBufferHeight;
  if (aspect < 1) aspect = 1 / aspect;
  var min = Math.round(resolution);
  var max = Math.round(resolution * aspect);
  if (gl.drawingBufferWidth > gl.drawingBufferHeight) return { width: max, height: min };
  return { width: min, height: max };
}

var dye, velocity, divergence, curl, pressure, simRes, dyeRes;
var filtering = supportLinearFiltering ? gl.LINEAR : gl.NEAREST;

function initFramebuffers() {
  simRes = getResolution(config.SIM_RESOLUTION);
  dyeRes = getResolution(config.DYE_RESOLUTION);
  dye = createDoubleFBO(dyeRes.width, dyeRes.height, formatRGBA.internalFormat, formatRGBA.format, halfFloatTexType, filtering);
  velocity = createDoubleFBO(simRes.width, simRes.height, formatRG.internalFormat, formatRG.format, halfFloatTexType, filtering);
  divergence = createFBO(simRes.width, simRes.height, formatR.internalFormat, formatR.format, halfFloatTexType, gl.NEAREST);
  curl = createFBO(simRes.width, simRes.height, formatR.internalFormat, formatR.format, halfFloatTexType, gl.NEAREST);
  pressure = createDoubleFBO(simRes.width, simRes.height, formatR.internalFormat, formatR.format, halfFloatTexType, gl.NEAREST);
}

function HSVtoRGB(h, s, v) {
  var r, g, b, i, f, p, q, t;
  i = Math.floor(h * 6);
  f = h * 6 - i;
  p = v * (1 - s);
  q = v * (1 - f * s);
  t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    default: r = v; g = p; b = q; break;
  }
  return { r: r, g: g, b: b };
}

function generateColor(intensity) {
  var c = HSVtoRGB(Math.random(), 1.0, 1.0);
  return { r: c.r * 0.15 * intensity, g: c.g * 0.15 * intensity, b: c.b * 0.15 * intensity };
}

var hoverHue = Math.random();
function hoverColor() {
  var c = HSVtoRGB(hoverHue, 0.9, 1.0);
  return { r: c.r * 0.055, g: c.g * 0.055, b: c.b * 0.055 };
}

function correctRadius(r) {
  var aspect = canvas.width / canvas.height;
  if (aspect > 1) r *= aspect;
  return r;
}

function splat(x, y, dx, dy, color) {
  splatProgram.bind();
  gl.uniform1i(splatProgram.uniforms.uTarget, velocity.read.attach(0));
  gl.uniform1f(splatProgram.uniforms.aspectRatio, canvas.width / canvas.height);
  gl.uniform2f(splatProgram.uniforms.point, x, y);
  gl.uniform3f(splatProgram.uniforms.color, dx, dy, 0);
  gl.uniform1f(splatProgram.uniforms.radius, correctRadius(config.SPLAT_RADIUS / 100));
  blit(velocity.write);
  velocity.swap();
  gl.uniform1i(splatProgram.uniforms.uTarget, dye.read.attach(0));
  gl.uniform3f(splatProgram.uniforms.color, color.r, color.g, color.b);
  blit(dye.write);
  dye.swap();
}

function multipleSplats(amount) {
  for (var i = 0; i < amount; i++) {
    var color = generateColor(10);
    var x = Math.random(), y = Math.random();
    var dx = 1000 * (Math.random() - 0.5);
    var dy = 1000 * (Math.random() - 0.5);
    splat(x, y, dx, dy, color);
  }
}

function clearTarget(target, value) {
  clearProgram.bind();
  gl.uniform1f(clearProgram.uniforms.value, value);
  gl.uniform1i(clearProgram.uniforms.uTexture, target.read.attach(0));
  blit(target.write);
  target.swap();
}

function step(dt) {
  gl.disable(gl.BLEND);

  curlProgram.bind();
  gl.uniform2f(curlProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(curlProgram.uniforms.uVelocity, velocity.read.attach(0));
  blit(curl);

  vorticityProgram.bind();
  gl.uniform2f(vorticityProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(vorticityProgram.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(vorticityProgram.uniforms.uCurl, curl.attach(1));
  gl.uniform1f(vorticityProgram.uniforms.curl, config.CURL);
  gl.uniform1f(vorticityProgram.uniforms.dt, dt);
  blit(velocity.write);
  velocity.swap();

  divergenceProgram.bind();
  gl.uniform2f(divergenceProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(divergenceProgram.uniforms.uVelocity, velocity.read.attach(0));
  blit(divergence);

  clearTarget(pressure, config.PRESSURE);

  pressureProgram.bind();
  gl.uniform2f(pressureProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(pressureProgram.uniforms.uDivergence, divergence.attach(0));
  for (var i = 0; i < config.PRESSURE_ITERATIONS; i++) {
    gl.uniform1i(pressureProgram.uniforms.uPressure, pressure.read.attach(1));
    blit(pressure.write);
    pressure.swap();
  }

  gradientProgram.bind();
  gl.uniform2f(gradientProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(gradientProgram.uniforms.uPressure, pressure.read.attach(0));
  gl.uniform1i(gradientProgram.uniforms.uVelocity, velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();

  advectionProgram.bind();
  gl.uniform2f(advectionProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  if (!supportLinearFiltering) gl.uniform2f(advectionProgram.uniforms.dyeTexelSize, velocity.texelSizeX, velocity.texelSizeY);
  var velocityId = velocity.read.attach(0);
  gl.uniform1i(advectionProgram.uniforms.uVelocity, velocityId);
  gl.uniform1i(advectionProgram.uniforms.uSource, velocityId);
  gl.uniform1f(advectionProgram.uniforms.dt, dt);
  gl.uniform1f(advectionProgram.uniforms.dissipation, config.VELOCITY_DISSIPATION);
  blit(velocity.write);
  velocity.swap();

  if (!supportLinearFiltering) gl.uniform2f(advectionProgram.uniforms.dyeTexelSize, dye.texelSizeX, dye.texelSizeY);
  gl.uniform1i(advectionProgram.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(advectionProgram.uniforms.uSource, dye.read.attach(1));
  gl.uniform1f(advectionProgram.uniforms.dissipation, config.DENSITY_DISSIPATION);
  blit(dye.write);
  dye.swap();
}

function render() {
  displayProgram.bind();
  gl.uniform2f(displayProgram.uniforms.texelSize, dye.texelSizeX, dye.texelSizeY);
  gl.uniform1i(displayProgram.uniforms.uTexture, dye.read.attach(0));
  blit(null);
}

var pointers = new Map();
function getPointer(id) {
  var p = pointers.get(id);
  if (!p) {
    p = { x: 0, y: 0, dx: 0, dy: 0, down: false, moved: false, has: false, color: generateColor(1) };
    pointers.set(id, p);
  }
  return p;
}

function updatePos(p, e) {
  var rect = canvas.getBoundingClientRect();
  p.x = (e.clientX - rect.left) / rect.width;
  p.y = 1 - (e.clientY - rect.top) / rect.height;
}

var lastInteraction = performance.now();

canvas.addEventListener('pointerdown', function (e) {
  e.preventDefault();
  var p = getPointer(e.pointerId);
  updatePos(p, e);
  p.has = true;
  p.down = true;
  p.color = generateColor(1);
  splat(p.x, p.y, (Math.random() - 0.5) * 240, (Math.random() - 0.5) * 240, generateColor(6));
  lastInteraction = performance.now();
});

canvas.addEventListener('pointermove', function (e) {
  var p = getPointer(e.pointerId);
  var prevX = p.x, prevY = p.y, had = p.has;
  updatePos(p, e);
  if (!had) { p.has = true; return; }
  var dx = p.x - prevX, dy = p.y - prevY;
  var aspect = canvas.width / canvas.height;
  if (aspect < 1) dx *= aspect; else dy /= aspect;
  p.dx += dx * config.SPLAT_FORCE * (p.down ? 1 : 0.5);
  p.dy += dy * config.SPLAT_FORCE * (p.down ? 1 : 0.5);
  if (Math.abs(dx) > 0 || Math.abs(dy) > 0) p.moved = true;
  lastInteraction = performance.now();
});

window.addEventListener('pointerup', function (e) {
  var p = pointers.get(e.pointerId);
  if (p) p.down = false;
});

window.addEventListener('pointercancel', function (e) {
  var p = pointers.get(e.pointerId);
  if (p) { p.down = false; p.has = false; }
});

canvas.addEventListener('pointerleave', function (e) {
  var p = pointers.get(e.pointerId);
  if (p) p.has = false;
});

function applyInputs() {
  pointers.forEach(function (p) {
    if (p.moved) {
      p.moved = false;
      var col;
      if (p.down) { col = p.color; } else { col = hoverColor(); }
      splat(p.x, p.y, p.dx, p.dy, col);
      p.dx = 0;
      p.dy = 0;
    }
  });
}

var lastAuto = 0;
function autoLife(now) {
  if (now - lastInteraction > 4500 && now - lastAuto > 1500) {
    lastAuto = now;
    splat(Math.random(), Math.random(), (Math.random() - 0.5) * 700, (Math.random() - 0.5) * 700, generateColor(4));
  }
}

function burst() {
  multipleSplats(Math.floor(Math.random() * 8) + 6);
  lastInteraction = performance.now();
}

function calm() {
  clearTarget(dye, 0);
  clearTarget(velocity, 0);
  clearTarget(pressure, 0);
  lastInteraction = performance.now();
}

var btnFs = document.getElementById('btn-fs');
function toggleFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }
}
document.addEventListener('fullscreenchange', function () {
  btnFs.textContent = document.fullscreenElement ? 'Exit fullscreen' : 'Fullscreen';
});

document.getElementById('btn-burst').addEventListener('click', burst);
document.getElementById('btn-calm').addEventListener('click', calm);
btnFs.addEventListener('click', toggleFullscreen);

window.addEventListener('keydown', function (e) {
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'b' || e.key === 'B' || e.key === ' ') { e.preventDefault(); burst(); }
  if (e.key === 'c' || e.key === 'C') calm();
});

var idleTimer = null;
function wakeUI() {
  document.body.classList.remove('idle');
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(function () { document.body.classList.add('idle'); }, 3500);
}
window.addEventListener('pointermove', wakeUI);
window.addEventListener('pointerdown', wakeUI);
window.addEventListener('keydown', wakeUI);
wakeUI();

initFramebuffers();
multipleSplats(Math.floor(Math.random() * 10) + 12);

var frames = 0, fpsTime = performance.now(), fpsText = '';
function updateStats() {
  statsEl.textContent = (isWebGL2 ? 'webgl2' : 'webgl1') + ' · sim ' + simRes.width + 'x' + simRes.height + ' · dye ' + dyeRes.width + 'x' + dyeRes.height + ' · ' + config.PRESSURE_ITERATIONS + ' jacobi/frame' + fpsText;
}
updateStats();

var lastUpdateTime = performance.now();
function update() {
  var now = performance.now();
  var dt = Math.min((now - lastUpdateTime) / 1000, 0.016666);
  lastUpdateTime = now;
  if (resizeCanvas()) {
    initFramebuffers();
    multipleSplats(8);
    updateStats();
  }
  hoverHue = (hoverHue + dt * 0.15) % 1;
  applyInputs();
  autoLife(now);
  step(dt);
  render();
  frames++;
  if (now - fpsTime > 1000) {
    fpsText = ' · ' + Math.round(frames * 1000 / (now - fpsTime)) + ' fps';
    frames = 0;
    fpsTime = now;
    updateStats();
  }
  requestAnimationFrame(update);
}
requestAnimationFrame(update);

} catch (err) {
  console.error(err);
  fail('Something went wrong starting the simulation on this device.');
}
})();
</script>
</body>
